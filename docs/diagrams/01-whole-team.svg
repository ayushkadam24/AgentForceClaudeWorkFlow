<rect width="1166" height="505" fill="#fcfcfb"/>
<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">01 · The Whole Team — Nine Agents, One Human, Three Phases</text><text x="28" y="54" font-size="11.5" fill="#52514e">Every agent reads PIPELINE_STATE.md before acting; the human approves every phase gate.</text><rect x="28" y="74" width="350" height="300" rx="10" fill="#ffffff" stroke="#e1e0d9" stroke-width="1.2"/><text x="42" y="96" font-size="12" fill="#898781" font-weight="700" letter-spacing="1.2">DISCOVERY</text><rect x="48" y="110" width="310" height="58" rx="8" fill="#2a78d61A" stroke="#2a78d6" stroke-width="1.6"/><text x="60" y="131" font-size="14" fill="#0b0b0b" font-weight="600">ba-analyst</text><text x="60" y="147" font-size="10.3" fill="#52514e">Reads 00-inputs/ → requirements brief (REQ-###)</text><text x="60" y="159.8" font-size="10.3" fill="#52514e">+ open questions (OQ-###). Never invents decisions.</text><rect x="310.4" y="117" width="39.6" height="16" rx="8" fill="#2a78d6"/><text x="330.2" y="128.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">opus</text><rect x="48" y="190" width="310" height="58" rx="8" fill="#1baf7a1A" stroke="#1baf7a" stroke-width="1.6"/><text x="60" y="211" font-size="14" fill="#0b0b0b" font-weight="600">architect</text><text x="60" y="227" font-size="10.3" fill="#52514e">Design mode: data model, ERD, §3.4 lock strategy,</text><text x="60" y="239.8" font-size="10.3" fill="#52514e">epics EP-##. Later: the as-built drift check.</text><rect x="310.4" y="197" width="39.6" height="16" rx="8" fill="#1baf7a"/><text x="330.2" y="208.5" font-size="9.5" fill="#0b0b0b" text-anchor="middle" font-weight="600">opus</text><path d="M203,168 L203,190" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="168.2" y="163" width="69.6" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="203" y="173" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">brief + OQs</text><rect x="48" y="286" width="310" height="52" rx="8" fill="#4a3aa71A" stroke="#4a3aa7" stroke-width="1.6"/><text x="60" y="307" font-size="14" fill="#0b0b0b" font-weight="600">pm-planner</text><text x="60" y="323" font-size="10.3" fill="#52514e">Design → sprints of VS-## tickets with G/W/T ACs,</text><text x="60" y="335.8" font-size="10.3" fill="#52514e">complexity-routed. Mirrors to Jira when connected.</text><rect x="297.6" y="293" width="52.400000000000006" height="16" rx="8" fill="#4a3aa7"/><text x="323.8" y="304.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">sonnet</text><path d="M203,248 L203,286" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="159.8" y="251" width="86.39999999999999" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="203" y="261" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">design + epics</text><rect x="408" y="74" width="350" height="300" rx="10" fill="#ffffff" stroke="#e1e0d9" stroke-width="1.2"/><text x="422" y="96" font-size="12" fill="#898781" font-weight="700" letter-spacing="1.2">BUILD</text><rect x="428" y="110" width="150" height="64" rx="8" fill="#0083001A" stroke="#008300" stroke-width="1.6"/><text x="440" y="131" font-size="14" fill="#0b0b0b" font-weight="600">dev-senior</text><text x="440" y="147" font-size="10.3" fill="#52514e">Locks, services,</text><text x="440" y="159.8" font-size="10.3" fill="#52514e">async, LWC</text><rect x="530.4" y="117" width="39.6" height="16" rx="8" fill="#008300"/><text x="550.2" y="128.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">opus</text><rect x="588" y="110" width="150" height="64" rx="8" fill="#eda1001A" stroke="#eda100" stroke-width="1.6"/><text x="600" y="131" font-size="14" fill="#0b0b0b" font-weight="600">dev-mid</text><text x="600" y="147" font-size="10.3" fill="#52514e">Flows, metadata,</text><text x="600" y="159.8" font-size="10.3" fill="#52514e">perm sets, config</text><rect x="677.6" y="117" width="52.400000000000006" height="16" rx="8" fill="#eda100"/><text x="703.8" y="128.5" font-size="9.5" fill="#0b0b0b" text-anchor="middle" font-weight="600">sonnet</text><rect x="428" y="205" width="310" height="56" rx="8" fill="#eb68341A" stroke="#eb6834" stroke-width="1.6"/><text x="440" y="226" font-size="14" fill="#0b0b0b" font-weight="600">code-reviewer</text><text x="440" y="242" font-size="10.3" fill="#52514e">Independent: Read/Grep/Bash only — cannot edit code.</text><text x="440" y="254.8" font-size="10.3" fill="#52514e">AC, §3.4 hostile review, security, limits, tests.</text><rect x="690.4" y="212" width="39.6" height="16" rx="8" fill="#eb6834"/><text x="710.2" y="223.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">opus</text><rect x="428" y="288" width="310" height="52" rx="8" fill="#52514e1A" stroke="#52514e" stroke-width="1.6"/><text x="440" y="309" font-size="14" fill="#0b0b0b" font-weight="600">devops</text><text x="440" y="325" font-size="10.3" fill="#52514e">Delta manifests, dry-run, human-gated deploys,</text><text x="440" y="337.8" font-size="10.3" fill="#52514e">ledger + runbook + error bisection protocol.</text><rect x="690.4" y="295" width="39.6" height="16" rx="8" fill="#52514e"/><text x="710.2" y="306.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">opus</text><path d="M503,174 L503,205" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="482.2" y="173.5" width="41.599999999999994" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="503" y="183.5" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">packet</text><path d="M663,174 L663,205" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="642.2" y="173.5" width="41.599999999999994" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="663" y="183.5" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">packet</text><path d="M583,261 L583,288" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="542.6" y="258.5" width="80.8" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="583" y="268.5" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">approved code</text><rect x="788" y="74" width="350" height="300" rx="10" fill="#ffffff" stroke="#e1e0d9" stroke-width="1.2"/><text x="802" y="96" font-size="12" fill="#898781" font-weight="700" letter-spacing="1.2">QA</text><rect x="808" y="110" width="310" height="56" rx="8" fill="#e87ba41A" stroke="#e87ba4" stroke-width="1.6"/><text x="820" y="131" font-size="14" fill="#0b0b0b" font-weight="600">qa-lead</text><text x="820" y="147" font-size="10.3" fill="#52514e">Risk-tiered test plan (TC-###): Tier 1 = slot integrity,</text><text x="820" y="159.8" font-size="10.3" fill="#52514e">cut-off, no-Aadhaar, RBAC. Splits scope run A / run B.</text><rect x="1057.6" y="117" width="52.400000000000006" height="16" rx="8" fill="#e87ba4"/><text x="1083.8" y="128.5" font-size="9.5" fill="#0b0b0b" text-anchor="middle" font-weight="600">sonnet</text><rect x="808" y="196" width="310" height="62" rx="8" fill="#e349481A" stroke="#e34948" stroke-width="1.6"/><text x="820" y="217" font-size="14" fill="#0b0b0b" font-weight="600">qa-engineer</text><text x="820" y="233" font-size="10.3" fill="#52514e">Drives the real org UI via Playwright: evidence</text><text x="820" y="245.8" font-size="10.3" fill="#52514e">screenshots, regression specs, BUG-### reports.</text><rect x="1057.6" y="203" width="52.400000000000006" height="16" rx="8" fill="#e34948"/><text x="1083.8" y="214.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">sonnet</text><path d="M963,166 L963,196" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="933.8" y="165" width="58.4" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="963" y="175" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">TC ranges</text><path d="M808,292 q0,-6 6,-6 h290 l14,14 v34 q0,6 -6,6 h-298 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M1104,286 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="818" y="307" font-size="12" fill="#0b0b0b" font-weight="600">GO / NO-GO</text><text x="818" y="322" font-size="10" fill="#52514e">qa-lead consolidates results; the human</text><text x="818" y="334.6" font-size="10" fill="#52514e">approves DONE at the final gate.</text><path d="M963,258 L963,286" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="919.8" y="256" width="86.39999999999999" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="963" y="266" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">results + bugs</text><path d="M378,315 L408,315" fill="none" stroke="#52514e" stroke-width="2" marker-end="url(#arrD)"/><path d="M758,315 L788,315" fill="none" stroke="#52514e" stroke-width="2" marker-end="url(#arrD)"/><rect x="28" y="404" width="640" height="54" rx="8" fill="#0b0b0b" stroke="#0b0b0b" stroke-width="1.6"/><text x="40" y="425" font-size="14" fill="#ffffff" font-weight="600">HUMAN (you)</text><text x="40" y="441" font-size="10.3" fill="#ffffffcc">Approves the 4 gates via /advance · reviews packets &amp; verdicts · answers open questions ·</text><text x="40" y="453.8" font-size="10.3" fill="#ffffffcc">authorizes every real deploy. Agents propose; the human decides.</text><path d="M696,410 q0,-6 6,-6 h422 l14,14 v34 q0,6 -6,6 h-430 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M1124,404 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="706" y="425" font-size="12" fill="#0b0b0b" font-weight="600">The file spine (shared memory)</text><text x="706" y="440" font-size="10" fill="#52514e">PIPELINE_STATE.md · .claude/memory/ (D-### / A-###) · jira-log.md ·</text><text x="706" y="452.6" font-size="10" fill="#52514e">agent-runs.log — sessions are disposable, files are the truth.</text><rect x="28" y="477" width="11" height="11" rx="3" fill="#2a78d6"/><text x="44" y="486" font-size="10.5" fill="#52514e">ba-analyst</text><rect x="122" y="477" width="11" height="11" rx="3" fill="#1baf7a"/><text x="138" y="486" font-size="10.5" fill="#52514e">architect</text><rect x="210.4" y="477" width="11" height="11" rx="3" fill="#4a3aa7"/><text x="226.4" y="486" font-size="10.5" fill="#52514e">pm-planner</text><rect x="304.4" y="477" width="11" height="11" rx="3" fill="#008300"/><text x="320.4" y="486" font-size="10.5" fill="#52514e">dev-senior</text><rect x="398.4" y="477" width="11" height="11" rx="3" fill="#eda100"/><text x="414.4" y="486" font-size="10.5" fill="#52514e">dev-mid</text><rect x="475.59999999999997" y="477" width="11" height="11" rx="3" fill="#eb6834"/><text x="491.59999999999997" y="486" font-size="10.5" fill="#52514e">code-reviewer</text><rect x="586.4" y="477" width="11" height="11" rx="3" fill="#52514e"/><text x="602.4" y="486" font-size="10.5" fill="#52514e">devops</text><rect x="658" y="477" width="11" height="11" rx="3" fill="#e87ba4"/><text x="674" y="486" font-size="10.5" fill="#52514e">qa-lead</text><rect x="735.2" y="477" width="11" height="11" rx="3" fill="#e34948"/><text x="751.2" y="486" font-size="10.5" fill="#52514e">qa-engineer</text></g>
</svg>
<rect width="1200" height="420" fill="#fcfcfb"/>
<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">05 · The Build Loop — Every Ticket Travels the Same Circle</text><text x="28" y="54" font-size="11.5" fill="#52514e">/dev-implement VS-## → draft + packet → independent review → human verdict → deploy. Repeat until the sprint is dry.</text><rect x="28" y="96" width="210" height="62" rx="8" fill="#0b0b0b" stroke="#0b0b0b" stroke-width="1.6"/><text x="40" y="117" font-size="14" fill="#ffffff" font-weight="600">/dev-implement VS-##</text><text x="40" y="133" font-size="10.3" fill="#ffffffcc">Command checks phase + routing,</text><text x="40" y="145.8" font-size="10.3" fill="#ffffffcc">launches the RIGHT dev agent.</text><rect x="300" y="92" width="250" height="74" rx="8" fill="#0083001A" stroke="#008300" stroke-width="1.6"/><text x="312" y="113" font-size="14" fill="#0b0b0b" font-weight="600">dev agent (senior | mid)</text><text x="312" y="129" font-size="10.3" fill="#52514e">One ticket at a time. Reads AC + design</text><text x="312" y="141.8" font-size="10.3" fill="#52514e">§ first. Lint + dry-run BEFORE claiming</text><text x="312" y="154.6" font-size="10.3" fill="#52514e">buildable (rules/20).</text><path d="M238,127 L300,127" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M612,90 q0,-6 6,-6 h220 l14,14 v22 q0,6 -6,6 h-228 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M838,84 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="622" y="105" font-size="12" fill="#0b0b0b" font-weight="600">force-app/ (draft code)</text><text x="622" y="120" font-size="10" fill="#52514e">metadata · Apex · tests · flows</text><path d="M612,142 q0,-6 6,-6 h220 l14,14 v34 q0,6 -6,6 h-228 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M838,136 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="622" y="157" font-size="12" fill="#0b0b0b" font-weight="600">VS-##-review.md packet</text><text x="622" y="172" font-size="10" fill="#52514e">what/why/AC-map · honest verify status ·</text><text x="622" y="184.6" font-size="10" fill="#52514e">Manual / setup steps section</text><path d="M550,112 L612,104" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M550,145 L612,158" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="908" y="92" width="258" height="74" rx="8" fill="#eb68341A" stroke="#eb6834" stroke-width="1.6"/><text x="920" y="113" font-size="14" fill="#0b0b0b" font-weight="600">code-reviewer</text><text x="920" y="129" font-size="10.3" fill="#52514e">via /dev-review — cannot edit code.</text><text x="920" y="141.8" font-size="10.3" fill="#52514e">Findings BLOCKER→NIT with file:line.</text><text x="920" y="154.6" font-size="10.3" fill="#52514e">APPROVE or REQUEST-CHANGES.</text><rect x="1118.4" y="99" width="39.6" height="16" rx="8" fill="#eb6834"/><text x="1138.2" y="110.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">opus</text><path d="M852,127 L908,127" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="839.6" y="111" width="80.8" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="880" y="121" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">packet + diff</text><rect x="908" y="216" width="258" height="56" rx="8" fill="#0b0b0b" stroke="#0b0b0b" stroke-width="1.6"/><text x="920" y="237" font-size="14" fill="#ffffff" font-weight="600">HUMAN verdict</text><text x="920" y="253" font-size="10.3" fill="#ffffffcc">Reviewer findings in hand: APPROVED</text><text x="920" y="265.8" font-size="10.3" fill="#ffffffcc">or CHANGES-REQUESTED (with notes).</text><path d="M1037,158 L1037,216" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="993.8" y="171" width="86.39999999999999" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="1037" y="181" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">recommendation</text><path d="M908,244 L425,244 L425,166" fill="none" stroke="#d03b3b" stroke-width="1.6" marker-end="url(#arrR)"/><rect x="535.6" y="228" width="248.79999999999998" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="660" y="238" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">CHANGES-REQUESTED → same agent, same ticket</text><rect x="614" y="310" width="250" height="58" rx="8" fill="#52514e1A" stroke="#52514e" stroke-width="1.6"/><text x="626" y="331" font-size="14" fill="#0b0b0b" font-weight="600">devops  (/deploy)</text><text x="626" y="347" font-size="10.3" fill="#52514e">Delta manifest → dry-run → your yes →</text><text x="626" y="359.8" font-size="10.3" fill="#52514e">deploy → ledger + runbook entries.</text><rect x="816.4" y="317" width="39.6" height="16" rx="8" fill="#52514e"/><text x="836.2" y="328.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">opus</text><path d="M1037,272 L1037,338 L864,338" fill="none" stroke="#0ca30c" stroke-width="1.6" marker-end="url(#arrG)"/><rect x="924.1" y="322" width="52.8" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="950.5" y="332" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">APPROVED</text><path d="M300,316 q0,-6 6,-6 h230 l14,14 v36 q0,6 -6,6 h-238 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M536,310 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="310" y="331" font-size="12" fill="#0b0b0b" font-weight="600">Ticket status advances</text><text x="310" y="346" font-size="10" fill="#52514e">jira-log.md line appended (In Review →</text><text x="310" y="358.6" font-size="10" fill="#52514e">Done) · agent-runs.log line · state log.</text><path d="M614,338 L550,338" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="524.8" y="322" width="114.39999999999999" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="582" y="332" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">deployed + recorded</text><path d="M300,338 L133,338 L133,162" fill="none" stroke="#52514e" stroke-width="1.6" marker-end="url(#arrD)"/><rect x="98.2" y="234" width="69.6" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="133" y="244" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">next ticket</text><text x="28" y="402" font-size="11" fill="#52514e">The stop-guard hook blocks any agent from finishing while its bookkeeping is stale — the loop cannot silently skip the paper trail.</text></g>
</svg>
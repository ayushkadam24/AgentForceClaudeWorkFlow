<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">03 · Discovery — From Client Documents to a Graded Requirements Brief</text><text x="28" y="54" font-size="11.5" fill="#52514e">The BA is graded against 14 gaps deliberately planted in the inputs. The answer key is mechanically unreadable by every agent.</text><path d="M28,90 q0,-6 6,-6 h220 l14,14 v98 q0,6 -6,6 h-228 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>

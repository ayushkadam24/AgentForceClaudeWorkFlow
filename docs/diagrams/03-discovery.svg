<path d="M854,156 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="652" y="177" font-size="12" fill="#0b0b0b" font-weight="600">open-questions.md</text><text x="652" y="192" font-size="10" fill="#52514e">27 OQ-### · owner · severity ·</text><text x="652" y="204.6" font-size="10" fill="#52514e">suggested default (labeled)</text><path d="M580,120 L642,112" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M580,165 L642,183" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M330,238 q0,-6 6,-6 h230 l14,14 v36 q0,6 -6,6 h-238 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M566,232 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="340" y="253" font-size="12" fill="#0b0b0b" font-weight="600">ANSWER-KEY (root)</text><text x="340" y="268" font-size="10" fill="#52514e">14 planted gaps — read ONLY by the</text><text x="340" y="280.6" font-size="10" fill="#52514e">human grader. Result: 11 + 2p + 1 miss ✓</text><path d="M755,216 L755,260 L580,260" fill="none" stroke="#52514e" stroke-width="1.6" marker-end="url(#arrD)"/><rect x="610.3" y="244" width="114.39999999999999" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="667.5" y="254" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">human grades vs key</text><path d="M455,232 L455,186" fill="none" stroke="#898781" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arr)"/><rect x="458" y="204" width="254.39999999999998" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="462" y="214" font-size="10.3" fill="#52514e" text-anchor="start" font-weight="500">score &lt;10? tighten prompt, /ba-analyze again</text><rect x="920" y="100" width="246" height="86" rx="8" fill="#1baf7a1A" stroke="#1baf7a" stroke-width="1.6"/><text x="932" y="121" font-size="14" fill="#0b0b0b" font-weight="600">architect</text><text x="932" y="137" font-size="10.3" fill="#52514e">Turns the brief into technical-</text><text x="932" y="149.8" font-size="10.3" fill="#52514e">design.md: VS_ data model, ERD,</text><text x="932" y="162.6" font-size="10.3" fill="#52514e">§3.4 lock strategy, compliance</text><text x="932" y="175.4" font-size="10.3" fill="#52514e">mapping, epics EP-01..08.</text><rect x="1118.4" y="107" width="39.6" height="16" rx="8" fill="#1baf7a"/><text x="1138.2" y="118.5" font-size="9.5" fill="#0b0b0b" text-anchor="middle" font-weight="600">opus</text><path d="M868,143 L920,143" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="836.8" y="127" width="114.39999999999999" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="894" y="137" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">gate-approved brief</text><path d="M920,238 q0,-6 6,-6 h226 l14,14 v36 q0,6 -6,6 h-234 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M1152,232 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="930" y="253" font-size="12" fill="#0b0b0b" font-weight="600">01-discovery/ outputs</text><text x="930" y="268" font-size="10" fill="#52514e">technical-design.md (38 KB) ·</text><text x="930" y="280.6" font-size="10" fill="#52514e">erd/data-model.mermaid · EP-01..08</text><path d="M1043,186 L1043,232" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><text x="28" y="330" font-size="11" fill="#52514e">Human gate answers close the open questions the BA refused to invent (capacity model, cut-off hours, walk-in %) — recorded as D-### decisions before design begins.</text></g>

<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">08 · QA — Risk Tiers First, Real Browser, Bugs That Route Back</text><text x="28" y="54" font-size="11.5" fill="#52514e">Tier 1 failures block release unconditionally. Every PASS carries evidence; every FAIL becomes a reproducible BUG-###.</text><rect x="28" y="92" width="240" height="60" rx="8" fill="#e87ba41A" stroke="#e87ba4" stroke-width="1.6"/><text x="40" y="113" font-size="14" fill="#0b0b0b" font-weight="600">qa-lead  (/qa-plan)</text><text x="40" y="129" font-size="10.3" fill="#52514e">Reads design, tickets, drift-check.</text><text x="40" y="141.8" font-size="10.3" fill="#52514e">Builds TC-### plan + coverage table.</text><rect x="207.6" y="99" width="52.400000000000006" height="16" rx="8" fill="#e87ba4"/><text x="233.8" y="110.5" font-size="9.5" fill="#0b0b0b" text-anchor="middle" font-weight="600">sonnet</text><rect x="316" y="92" width="330" height="34" rx="6" fill="#d03b3b22" stroke="#d03b3b" stroke-width="1.2"/><text x="326" y="106" font-size="10.5" fill="#0b0b0b" font-weight="600">TIER 1 — test first, block release</text><text x="326" y="119" font-size="9.2" fill="#52514e">slot integrity §3.4 · cancel cut-off · no-Aadhaar · facility RBAC</text><rect x="316" y="134" width="330" height="34" rx="6" fill="#fab21922" stroke="#fab219" stroke-width="1.2"/><text x="326" y="148" font-size="10.5" fill="#0b0b0b" font-weight="600">TIER 2</text><text x="326" y="161" font-size="9.2" fill="#52514e">reminders · next-dose · certificates · check-in · wastage view</text><rect x="316" y="176" width="330" height="34" rx="6" fill="#c3c2b7" stroke="#c3c2b7" stroke-width="1.2"/><text x="326" y="190" font-size="10.5" fill="#0b0b0b" font-weight="600">TIER 3</text><text x="326" y="203" font-size="9.2" fill="#52514e">cosmetic · copy · layout polish</text><path d="M268,122 L316,122" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="706" y="84" width="226" height="64" rx="8" fill="#e349481A" stroke="#e34948" stroke-width="1.6"/><text x="718" y="105" font-size="14" fill="#0b0b0b" font-weight="600">qa-eng · run A</text><text x="718" y="121" font-size="10.3" fill="#52514e">TC range 1: booking, cancel,</text><text x="718" y="133.8" font-size="10.3" fill="#52514e">concurrency two-browser test</text><rect x="871.6" y="91" width="52.400000000000006" height="16" rx="8" fill="#e34948"/><text x="897.8" y="102.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">sonnet</text><rect x="706" y="162" width="226" height="64" rx="8" fill="#e349481A" stroke="#e34948" stroke-width="1.6"/><text x="718" y="183" font-size="14" fill="#0b0b0b" font-weight="600">qa-eng · run B</text><text x="718" y="199" font-size="10.3" fill="#52514e">TC range 2: staff console,</text><text x="718" y="211.8" font-size="10.3" fill="#52514e">certificates, accessibility (axe)</text><rect x="871.6" y="169" width="52.400000000000006" height="16" rx="8" fill="#e34948"/><text x="897.8" y="180.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">sonnet</text><path d="M646,110 L706,110" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="641.2" y="94" width="69.6" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="676" y="104" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">scope split</text><path d="M646,150 L676,150 L676,192 L706,192" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M986,82 q0,-6 6,-6 h168 l14,14 v36 q0,6 -6,6 h-176 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M1160,76 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="996" y="97" font-size="12" fill="#0b0b0b" font-weight="600">evidence/</text><text x="996" y="112" font-size="10" fill="#52514e">TC-###-step.png per</text><text x="996" y="124.6" font-size="10" fill="#52514e">executed test</text><path d="M986,148 q0,-6 6,-6 h168 l14,14 v36 q0,6 -6,6 h-176 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>

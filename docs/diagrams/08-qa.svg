<path d="M1160,208 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="996" y="229" font-size="12" fill="#0b0b0b" font-weight="600">bug-reports/</text><text x="996" y="244" font-size="10" fill="#52514e">BUG-### exact repro steps,</text><text x="996" y="256.6" font-size="10" fill="#52514e">severity, evidence links</text><path d="M932,104 L986,100" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M932,140 L986,166" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M932,194 L986,232" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="316" y="232" width="330" height="66" rx="8" fill="#e3494811" stroke="#e34948" stroke-width="1.3"/><text x="330" y="252" font-size="10.8" fill="#e34948" font-weight="600">THE §3.4 TEST (acceptance-critical)</text><text x="330" y="267" font-size="9.3" fill="#52514e">Two parallel browser contexts race for the same last slot place.</text><text x="330" y="279.555" font-size="9.3" fill="#52514e">Exactly ONE confirmation + one SLOT_FULL, booked = capacity, 3×.</text><text x="330" y="292.11" font-size="9.3" fill="#52514e">Any double-book = Sev-1, release-blocking.</text><rect x="28" y="232" width="240" height="66" rx="8" fill="#e87ba41A" stroke="#e87ba4" stroke-width="1.6"/><text x="40" y="253" font-size="14" fill="#0b0b0b" font-weight="600">qa-lead  (/qa-report)</text><text x="40" y="269" font-size="10.3" fill="#52514e">Consolidates TC results + bugs into</text><text x="40" y="281.8" font-size="10.3" fill="#52514e">GO / NO-GO with reasons.</text><path d="M316,265 L268,265" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="268.4" y="249" width="47.199999999999996" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="292" y="259" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">results</text><path d="M148,340 L174,366 L148,392 L122,366 z" fill="#d03b3b"/><text x="148" y="364" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">HUMAN</text><text x="148" y="375" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">GATE</text><text x="148" y="407" font-size="10.5" fill="#0b0b0b" text-anchor="middle" font-weight="600">QA_IN_PROGRESS → DONE</text><text x="148" y="421" font-size="9.5" fill="#52514e" text-anchor="middle">GO only</text><path d="M148,298 L148,340" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M1080,264 L1080,330 L420,330" fill="none" stroke="#d03b3b" stroke-width="1.6" marker-end="url(#arrR)"/><rect x="592" y="315" width="316" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="750" y="325" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">bugs → /dev-implement → /dev-review → /deploy → re-test</text></g>

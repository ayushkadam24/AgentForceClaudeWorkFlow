<rect width="1200" height="425" fill="#fcfcfb"/>
<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">09 · The Five-Layer Guardrail Stack — Prompts Are Advice, Hooks Are Law</text><text x="28" y="54" font-size="11.5" fill="#52514e">Each layer catches what the softer layer above lets through. An independent health check audits the whole system from outside.</text><rect x="28" y="84" width="700" height="54" rx="8" fill="#2a78d614" stroke="#2a78d6" stroke-width="1.6"/><text x="44" y="103" font-size="12.5" fill="#0b0b0b" font-weight="600">L1 · PROMPT RULES</text><text x="44" y="118" font-size="10" fill="#52514e">hard rules in every agent + write-access matrix (rules/00)</text><text x="44" y="131" font-size="10" fill="#52514e" font-weight="600">stops: most mistakes, most of the time — but advisory</text><rect x="28" y="146" width="760" height="54" rx="8" fill="#1baf7a14" stroke="#1baf7a" stroke-width="1.6"/><text x="44" y="165" font-size="12.5" fill="#0b0b0b" font-weight="600">L2 · STRUCTURAL LIMITS</text><text x="44" y="180" font-size="10" fill="#52514e">per-agent tool lists · model pinning · 4 human gates</text><text x="44" y="193" font-size="10" fill="#52514e" font-weight="600">stops: misuse of tools an agent simply does not have</text><rect x="28" y="208" width="820" height="54" rx="8" fill="#4a3aa714" stroke="#4a3aa7" stroke-width="1.6"/><text x="44" y="227" font-size="12.5" fill="#0b0b0b" font-weight="600">L3 · PERMISSION DENIES</text><text x="44" y="242" font-size="10" fill="#52514e">settings.json: answer key, 00-inputs/, rules/, hooks/ unwritable</text><text x="44" y="255" font-size="10" fill="#52514e" font-weight="600">stops: file-tool access to protected paths</text><rect x="28" y="270" width="880" height="54" rx="8" fill="#eb683414" stroke="#eb6834" stroke-width="1.6"/><text x="44" y="289" font-size="12.5" fill="#0b0b0b" font-weight="600">L4 · PRETOOL HOOK</text><text x="44" y="304" font-size="10" fill="#52514e">pretool-guard.js runs before EVERY Bash/Write/Edit — deterministic</text><text x="44" y="317" font-size="10" fill="#52514e" font-weight="600">stops: shell bypasses · Aadhaar content · git push · org deletes · prod deploys</text><rect x="28" y="332" width="940" height="54" rx="8" fill="#d03b3b14" stroke="#d03b3b" stroke-width="1.6"/><text x="44" y="351" font-size="12.5" fill="#0b0b0b" font-weight="600">L5 · STOP HOOKS</text><text x="44" y="366" font-size="10" fill="#52514e">stop-guard.js on Stop + SubagentStop</text><text x="44" y="379" font-size="10" fill="#d03b3b" font-weight="600">stops: finishing with stale bookkeeping — agent is blocked until logs exist</text><rect x="1046" y="140" width="134" height="160" rx="8" fill="#0ca30c1A" stroke="#0ca30c" stroke-width="1.6"/><text x="1058" y="161" font-size="14" fill="#0b0b0b" font-weight="600"></text><text x="1113" y="168" font-size="13" fill="#0b0b0b" text-anchor="middle" font-weight="600">/health</text><text x="1113" y="188" font-size="9.5" fill="#52514e" text-anchor="middle">health-check.js</text><text x="1113" y="200.825" font-size="9.5" fill="#52514e" text-anchor="middle">+ metadata-lint.js</text><text x="1113" y="213.65" font-size="9.5" fill="#52514e" text-anchor="middle"></text><text x="1113" y="226.475" font-size="9.5" fill="#52514e" text-anchor="middle">deterministic</text><text x="1113" y="239.3" font-size="9.5" fill="#52514e" text-anchor="middle">outside auditor:</text><text x="1113" y="252.125" font-size="9.5" fill="#52514e" text-anchor="middle">PASS / WARN / FAIL,</text><text x="1113" y="264.95" font-size="9.5" fill="#52514e" text-anchor="middle">no LLM judgment</text><path d="M1046,220 L995,220" fill="none" stroke="#0ca30c" stroke-width="1.6" marker-end="url(#arrG)"/><rect x="968.4" y="198" width="103.19999999999999" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="1020" y="208" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">audits all layers</text><text x="28" y="398" font-size="10.8" fill="#52514e">Session-1 proof: a prompt injection tried to fake answer-key grading and demand concealment — refused at L1/L2, and the key itself stayed unreadable at L3/L4.</text><text x="28" y="412.58" font-size="10.8" fill="#52514e">Guardrails fail open on malformed input (a broken guardrail never bricks the session) and only a human editing files directly can bypass them — which is the point.</text></g>
</svg>
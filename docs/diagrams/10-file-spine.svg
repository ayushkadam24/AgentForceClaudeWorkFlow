<rect width="1200" height="440" fill="#fcfcfb"/>
<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">10 · The File Spine — How Agents Share Memory Without Sharing a Conversation</text><text x="28" y="54" font-size="11.5" fill="#52514e">Sessions are disposable; files are the truth. Every handoff is a file another agent reads — never a chat message.</text><path d="M470,90 q0,-6 6,-6 h240 l14,14 v42 q0,6 -6,6 h-248 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M716,84 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="480" y="105" font-size="12" fill="#0b0b0b" font-weight="600">PIPELINE_STATE.md</text><text x="480" y="120" font-size="10" fill="#52514e">YAML block = machine state (phase,</text><text x="480" y="132.6" font-size="10" fill="#52514e">next command) + append-only audit log.</text><text x="480" y="145.2" font-size="10" fill="#52514e">One step at a time, never past a gate.</text><path d="M470,164 q0,-6 6,-6 h240 l14,14 v36 q0,6 -6,6 h-248 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M716,158 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="480" y="179" font-size="12" fill="#0b0b0b" font-weight="600">.claude/memory/</text><text x="480" y="194" font-size="10" fill="#52514e">decisions D-### (write-FIRST registry) ·</text><text x="480" y="206.6" font-size="10" fill="#52514e">assumptions A-### · glossary · handoffs</text><path d="M470,232 q0,-6 6,-6 h240 l14,14 v30 q0,6 -6,6 h-248 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M716,226 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="480" y="247" font-size="12" fill="#0b0b0b" font-weight="600">.claude/logs/agent-runs.log</text><text x="480" y="262" font-size="10" fill="#52514e">one line per run — stop-guard blocks</text><text x="480" y="274.6" font-size="10" fill="#52514e">any agent that skips it</text><path d="M470,294 q0,-6 6,-6 h240 l14,14 v30 q0,6 -6,6 h-248 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M716,288 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="480" y="309" font-size="12" fill="#0b0b0b" font-weight="600">02-build/jira-log.md + ledgers</text><text x="480" y="324" font-size="10" fill="#52514e">ticket status history · deployments.md ·</text><text x="480" y="336.6" font-size="10" fill="#52514e">runbook.md — all append-only</text><rect x="28" y="84" width="240" height="48" rx="8" fill="#2a78d61A" stroke="#2a78d6" stroke-width="1.6"/><text x="40" y="105" font-size="14" fill="#0b0b0b" font-weight="600">ba-analyst</text><text x="40" y="121" font-size="10.3" fill="#52514e">writes: 01-discovery/ brief + OQs</text><path d="M268,108 L470,108" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="294" y="92" width="148" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="368" y="102" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">read state → act → append</text><rect x="28" y="148" width="240" height="48" rx="8" fill="#1baf7a1A" stroke="#1baf7a" stroke-width="1.6"/><text x="40" y="169" font-size="14" fill="#0b0b0b" font-weight="600">architect</text><text x="40" y="185" font-size="10.3" fill="#52514e">writes: design, erd/, drift-check</text><path d="M268,172 L470,172" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="294" y="156" width="148" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="368" y="166" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">read state → act → append</text><rect x="28" y="212" width="240" height="48" rx="8" fill="#4a3aa71A" stroke="#4a3aa7" stroke-width="1.6"/><text x="40" y="233" font-size="14" fill="#0b0b0b" font-weight="600">pm-planner</text><text x="40" y="249" font-size="10.3" fill="#52514e">writes: sprint-plan, jira-log</text><path d="M268,236 L470,236" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="294" y="220" width="148" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="368" y="230" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">read state → act → append</text><rect x="28" y="276" width="240" height="48" rx="8" fill="#0083001A" stroke="#008300" stroke-width="1.6"/><text x="40" y="297" font-size="14" fill="#0b0b0b" font-weight="600">dev agents</text><text x="40" y="313" font-size="10.3" fill="#52514e">write: force-app/, review packets</text><path d="M268,300 L470,300" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="294" y="284" width="148" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="368" y="294" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">read state → act → append</text><rect x="930" y="84" width="240" height="48" rx="8" fill="#eb68341A" stroke="#eb6834" stroke-width="1.6"/><text x="942" y="105" font-size="14" fill="#0b0b0b" font-weight="600">code-reviewer</text><text x="942" y="121" font-size="10.3" fill="#52514e">writes ONLY its review file</text><path d="M930,108 L730,108" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="930" y="148" width="240" height="48" rx="8" fill="#52514e1A" stroke="#52514e" stroke-width="1.6"/><text x="942" y="169" font-size="14" fill="#0b0b0b" font-weight="600">devops</text><text x="942" y="185" font-size="10.3" fill="#52514e">writes ledgers, never code</text><path d="M930,172 L730,172" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="930" y="212" width="240" height="48" rx="8" fill="#e87ba41A" stroke="#e87ba4" stroke-width="1.6"/><text x="942" y="233" font-size="14" fill="#0b0b0b" font-weight="600">qa-lead</text><text x="942" y="249" font-size="10.3" fill="#52514e">writes test-plan</text><path d="M930,236 L730,236" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="930" y="276" width="240" height="48" rx="8" fill="#e349481A" stroke="#e34948" stroke-width="1.6"/><text x="942" y="297" font-size="14" fill="#0b0b0b" font-weight="600">qa-engineer</text><text x="942" y="313" font-size="10.3" fill="#52514e">writes evidence, specs, bugs</text><path d="M930,300 L730,300" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="470" y="352" width="260" height="34" rx="7" fill="#f0efec"/><text x="600" y="373" font-size="11" fill="#52514e" text-anchor="middle" font-weight="600">write-access matrix: rules/00</text><text x="28" y="412" font-size="10.8" fill="#52514e">Append-only discipline: shared logs take atomic appends only; parallel agents never read-modify-write them. Union-merge .gitattributes keeps</text><text x="28" y="426.58" font-size="10.8" fill="#52514e">concurrent appends conflict-free when the parallel lanes activate.</text></g>
</svg>
<rect width="1200" height="380" fill="#fcfcfb"/>
<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">04 · Sprint Planning — Complexity Routing Decides Which Developer Builds What</text><text x="28" y="54" font-size="11.5" fill="#52514e">One rule of thumb: if a race condition, governor limit, or callout can ruin it → dev-senior.</text><rect x="28" y="90" width="236" height="74" rx="8" fill="#4a3aa71A" stroke="#4a3aa7" stroke-width="1.6"/><text x="40" y="111" font-size="14" fill="#0b0b0b" font-weight="600">pm-planner</text><text x="40" y="127" font-size="10.3" fill="#52514e">Reads design + brief. Builds ~1-week</text><text x="40" y="139.8" font-size="10.3" fill="#52514e">sprints of VS-## tickets: story, Given/</text><text x="40" y="152.6" font-size="10.3" fill="#52514e">When/Then ACs, estimate, dependencies.</text><rect x="203.6" y="97" width="52.400000000000006" height="16" rx="8" fill="#4a3aa7"/><text x="229.8" y="108.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">sonnet</text><path d="M28,198 q0,-6 6,-6 h216 l14,14 v44 q0,6 -6,6 h-224 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M250,192 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="38" y="213" font-size="12" fill="#0b0b0b" font-weight="600">REQ → ticket coverage</text><text x="38" y="228" font-size="10" fill="#52514e">Every Must REQ maps to ≥1 ticket;</text><text x="38" y="240.6" font-size="10" fill="#52514e">uncovered Musts are named, never</text><text x="38" y="253.2" font-size="10" fill="#52514e">silently dropped.</text><path d="M146,164 L146,192" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M390,127 L465,89 L540,127 L465,165 z" fill="#ffffff" stroke="#4a3aa7" stroke-width="1.8"/><text x="465" y="118" font-size="11.5" fill="#0b0b0b" text-anchor="middle" font-weight="600">complexity</text><text x="465" y="133" font-size="11.5" fill="#0b0b0b" text-anchor="middle" font-weight="600">rubric</text><path d="M264,127 L390,127" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="292.2" y="111" width="69.6" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="327" y="121" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">each ticket</text><rect x="620" y="60" width="260" height="70" rx="8" fill="#0083001A" stroke="#008300" stroke-width="1.6"/><text x="632" y="81" font-size="14" fill="#0b0b0b" font-weight="600">dev-senior  (opus)</text><text x="632" y="97" font-size="10.3" fill="#52514e">VS-06 slot-gen batch · VS-09 booking</text><text x="632" y="109.8" font-size="10.3" fill="#52514e">service FOR UPDATE lock · VS-10/11</text><text x="632" y="122.6" font-size="10.3" fill="#52514e">services · LWCs · async jobs</text><rect x="620" y="152" width="260" height="70" rx="8" fill="#eda1001A" stroke="#eda100" stroke-width="1.6"/><text x="632" y="173" font-size="14" fill="#0b0b0b" font-weight="600">dev-mid  (sonnet)</text><text x="632" y="189" font-size="10.3" fill="#52514e">VS-01 objects · VS-02 settings ·</text><text x="632" y="201.8" font-size="10.3" fill="#52514e">VS-03 screen flow · VS-04 perm sets ·</text><text x="632" y="214.6" font-size="10.3" fill="#52514e">VS-05 slot object · flows/config</text><path d="M540,115 L580,95 L620,95" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="517.6" y="79" width="164.79999999999998" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="600" y="89" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">transactional / lock / async</text><path d="M540,140 L580,187 L620,187" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="534.4" y="171" width="131.2" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="600" y="181" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">declarative / metadata</text><path d="M940,66 q0,-6 6,-6 h206 l14,14 v56 q0,6 -6,6 h-214 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M1152,60 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="950" y="81" font-size="12" fill="#0b0b0b" font-weight="600">02-build/sprint-plan.md</text><text x="950" y="96" font-size="10" fill="#52514e">4 sprints · 22 tickets · dependency-</text><text x="950" y="108.6" font-size="10" fill="#52514e">sequenced (data model first, service</text><text x="950" y="121.2" font-size="10" fill="#52514e">before UI)</text><path d="M940,158 q0,-6 6,-6 h206 l14,14 v56 q0,6 -6,6 h-214 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M1152,152 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="950" y="173" font-size="12" fill="#0b0b0b" font-weight="600">02-build/jira-log.md</text><text x="950" y="188" font-size="10" fill="#52514e">Append-only register + status history.</text><text x="950" y="200.6" font-size="10" fill="#52514e">Source of truth (D-004). Jira mirror:</text><text x="950" y="213.2" font-size="10" fill="#52514e">VS-nn = SCRUM-(nn+12)</text><path d="M880,95 L940,95" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M880,187 L940,187" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M146,294 L172,320 L146,346 L120,320 z" fill="#d03b3b"/><text x="146" y="318" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">HUMAN</text><text x="146" y="329" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">GATE</text><text x="146" y="361" font-size="10.5" fill="#0b0b0b" text-anchor="middle" font-weight="600">SPRINT_PLANNED → DEV_IN_PROGRESS</text><text x="146" y="375" font-size="9.5" fill="#52514e" text-anchor="middle">nothing is built until you approve the plan</text><path d="M146,256 L146,294" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><text x="400" y="300" font-size="11" fill="#52514e">Jira not connected? pm-planner proceeds file-locally and says so — it never blocks, never pretends.</text><text x="400" y="314.85" font-size="11" fill="#52514e">When the Atlassian MCP connects later, one instruction backfills the whole board from jira-log.md.</text></g>
</svg>
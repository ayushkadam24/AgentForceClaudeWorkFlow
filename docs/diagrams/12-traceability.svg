<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">12 · The Traceability Chain — One Requirement, Followed All the Way Down</text><text x="28" y="54" font-size="11.5" fill="#52514e">Every artifact cites the IDs upstream of it. Grep any ID and you get its whole life story.</text><rect x="28" y="84" width="190" height="38" rx="8" fill="#c3c2b71A" stroke="#c3c2b7" stroke-width="1.6"/><text x="40" y="105" font-size="14" fill="#0b0b0b" font-weight="600">RFP §3.4</text><text x="240" y="100" font-size="10.5" fill="#0b0b0b" font-weight="600">client document</text><text x="240" y="114" font-size="10" fill="#52514e">"bookings must never exceed capacity, under any conditions"</text><text x="880" y="108" font-size="9.8" fill="#898781">00-inputs/rfp/</text><path d="M123,122 L123,131" fill="none" stroke="#898781" stroke-width="1.4" marker-end="url(#arr)"/><rect x="28" y="131" width="190" height="38" rx="8" fill="#2a78d61A" stroke="#2a78d6" stroke-width="1.6"/><text x="40" y="152" font-size="14" fill="#0b0b0b" font-weight="600">REQ-014</text><text x="240" y="147" font-size="10.5" fill="#0b0b0b" font-weight="600">ba-analyst</text><text x="240" y="161" font-size="10" fill="#52514e">Must: concurrency-safe booking; source RFP §3.4</text><text x="880" y="155" font-size="9.8" fill="#898781">requirements-brief.md</text><path d="M123,169 L123,178" fill="none" stroke="#898781" stroke-width="1.4" marker-end="url(#arr)"/><rect x="28" y="178" width="190" height="38" rx="8" fill="#1baf7a1A" stroke="#1baf7a" stroke-width="1.6"/><text x="40" y="199" font-size="14" fill="#0b0b0b" font-weight="600">EP-03 + D-019</text><text x="240" y="194" font-size="10.5" fill="#0b0b0b" font-weight="600">architect</text><text x="240" y="208" font-size="10" fill="#52514e">Slot-Integrity Booking epic · single session-row FOR UPDATE lock</text><text x="880" y="202" font-size="9.8" fill="#898781">technical-design.md</text><path d="M123,216 L123,225" fill="none" stroke="#898781" stroke-width="1.4" marker-end="url(#arr)"/><rect x="28" y="225" width="190" height="38" rx="8" fill="#4a3aa71A" stroke="#4a3aa7" stroke-width="1.6"/><text x="40" y="246" font-size="14" fill="#0b0b0b" font-weight="600">VS-09</text><text x="240" y="241" font-size="10.5" fill="#0b0b0b" font-weight="600">pm-planner</text><text x="240" y="255" font-size="10" fill="#52514e">ticket: VS_BookingService.book() — routed dev-senior, Highest</text><text x="880" y="249" font-size="9.8" fill="#898781">sprint-plan / jira-log (SCRUM-21)</text><path d="M123,263 L123,272" fill="none" stroke="#898781" stroke-width="1.4" marker-end="url(#arr)"/><rect x="28" y="272" width="190" height="38" rx="8" fill="#0083001A" stroke="#008300" stroke-width="1.6"/><text x="40" y="293" font-size="14" fill="#0b0b0b" font-weight="600">code + tests</text><text x="240" y="288" font-size="10.5" fill="#0b0b0b" font-weight="600">dev-senior</text><text x="240" y="302" font-size="10" fill="#52514e">lock verified: no TOCTOU, no unlocked write path, 53 asserts</text><text x="880" y="296" font-size="9.8" fill="#898781">force-app/ + VS-09-review.md</text><path d="M123,310 L123,319" fill="none" stroke="#898781" stroke-width="1.4" marker-end="url(#arr)"/><rect x="28" y="319" width="190" height="38" rx="8" fill="#eb68341A" stroke="#eb6834" stroke-width="1.6"/><text x="40" y="340" font-size="14" fill="#0b0b0b" font-weight="600">review verdict</text><text x="240" y="335" font-size="10.5" fill="#0b0b0b" font-weight="600">code-reviewer</text><text x="240" y="349" font-size="10" fill="#52514e">APPROVE-WITH-FIXES: "§3.4 lock verified SOUND"</text><text x="880" y="343" font-size="9.8" fill="#898781">VS-09-code-review.md</text><path d="M123,357 L123,366" fill="none" stroke="#898781" stroke-width="1.4" marker-end="url(#arr)"/><rect x="28" y="366" width="190" height="38" rx="8" fill="#e349481A" stroke="#e34948" stroke-width="1.6"/><text x="40" y="387" font-size="14" fill="#0b0b0b" font-weight=
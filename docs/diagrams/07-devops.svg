<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
<defs>
<marker id="arr" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#898781"/></marker>
<marker id="arrD" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#52514e"/></marker>
<marker id="arrR" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#d03b3b"/></marker>
<marker id="arrG" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#0ca30c"/></marker>
</defs>
<rect width="1200" height="420" fill="#fcfcfb"/>
<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">07 · DevOps — Human-Gated Deploys and the Bisection Protocol</text><text x="28" y="54" font-size="11.5" fill="#52514e">The DE org has no source tracking: if devops doesn’t record it, nobody knows it happened.</text><rect x="28" y="92" width="190" height="56" rx="8" fill="#52514e1A" stroke="#52514e" stroke-width="1.6"/><text x="40" y="113" font-size="14" fill="#0b0b0b" font-weight="600">1 · prepare</text><text x="40" y="129" font-size="10.3" fill="#52514e">delta manifest generated from</text><text x="40" y="141.8" font-size="10.3" fill="#52514e">source — never hand-edited</text><rect x="248" y="92" width="190" height="56" rx="8" fill="#52514e1A" stroke="#52514e" stroke-width="1.6"/><text x="260" y="113" font-size="14" fill="#0b0b0b" font-weight="600">2 · validate</text><text x="260" y="129" font-size="10.3" fill="#52514e">metadata-lint.js · --dry-run ·</text><text x="260" y="141.8" font-size="10.3" fill="#52514e">sf apex run test (real output)</text><path d="M516,94 L542,120 L516,146 L490,120 z" fill="#d03b3b"/><text x="516" y="118" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">HUMAN</text><text x="516" y="129" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">GATE</text><text x="516" y="172" font-size="10" fill="#d03b3b" text-anchor="middle" font-weight="600">your explicit "yes"</text><rect x="594" y="92" width="190" height="56" rx="8" fill="#52514e1A" stroke="#52514e" stroke-width="1.6"/><text x="606" y="113" font-size="14" fill="#0b0b0b" font-weight="600">3 · execute</text><text x="606" y="129" font-size="10.3" fill="#52514e">deploy ID captured ·</text><text x="606" y="141.8" font-size="10.3" fill="#52514e">POC org only (hook-enforced)</text><rect x="814" y="92" width="190" height="56" rx="8" fill="#52514e1A" stroke="#52514e" stroke-width="1.6"/><text x="826" y="113" font-size="14" fill="#0b0b0b" font-weight="600">4 · record</text><text x="826" y="129" font-size="10.3" fill="#52514e">deployments.md ledger row ·</text><text x="826" y="141.8" font-size="10.3" fill="#52514e">runbook post-steps checked</text><path d="M218,120 L248,120" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M438,120 L488,120" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M544,120 L594,120" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M784,120 L814,120" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M1034,90 q0,-6 6,-6 h120 l14,14 v52 q0,6 -6,6 h-128 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M1160,84 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="1044" y="105" font-size="12" fill="#0b0b0b" font-weight="600">runbook.md</text><text x="1044" y="120" font-size="10" fill="#52514e">pre-deploy</text><text x="1044" y="132.6" font-size="10" fill="#52514e">post-deploy</text><text x="1044" y="145.2" font-size="10" fill="#52514e">manual-only steps</text><path d="M1004,120 L1034,120" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="28" y="210" width="1146" height="150" rx="10" fill="#d03b3b0D" stroke="#d03b3b" stroke-width="1.2"/><text x="44" y="234" font-size="12" fill="#d03b3b" font-weight="600">ON ANY FAILURE — the mandatory protocol (never retry an unchanged deploy)</text><rect x="44" y="248" width="210" height="72" rx="7" fill="#ffffff" stroke="#d03b3b" stroke-width="1.1"/><text x="54" y="268" font-size="11.5" fill="#0b0b0b" font-weight="600">CAPTURE</text><text x="54" y="283" font-size="9.3" fill="#52514e">--json output; every</text><text x="54" y="295.555" font-size="9.3" fill="#52514e">componentFailure recorded VERBATIM</text><text x="54" y="308.11" font-size="9.3" fill="#52514e">in the Errors table BEFORE any fix</text><path d="M254,284 L270,284" fill="none" stroke="#d03b3b" stroke-width="1.6" marker-end="url(#arrR)"/><rect x="270" y="248" width="210" height="72" rx="7" fill="#ffffff" stroke="#d03b3b" stroke-width="1.1"/><text x="280" y="268" font-size="11.5" fill="#0b0b0b" font-weight="600">BISECT</text><text x="280" y="283" font-size="9.3" fill="#52514e">by layer: objects → fields → CMDT</text><text x="280" y="295.555" font-size="9.3" fill="#52514e">→ classes → flows → permsets →</text><text x="280" y="308.11" font-size="9.3" fill="#52514e">settings; smallest failing set</text><path d="M480,284 L496,284" fill="none" stroke="#d03b3b" stroke-width="1.6" marker-end="url(#arrR)"/><rect x="496" y="248" width="210" height="72" rx="7" fill="#ffffff" stroke="#d03b3b" stroke-width="1.1"/><text x="506" y="268" font-size="11.5" fill="#0b0b0b" font-weight="600">CLASSIFY</text><text x="506" y="283" font-size="9.3" fill="#52514e">schema | missing dependency | org</text><text x="506" y="295.555" font-size="9.3" fill="#52514e">capability (→ D-### exclude) |</text><text x="506" y="308.11" font-size="9.3" fill="#52514e">test failure (→ dev ticket)</text><path d="M706,284 L722,284" fill="none" stroke="#d03b3b" stroke-width="1.6" marker-end="url(#arrR)"/><rect x="722" y="248" width="210" height="72" rx="7" fill="#ffffff" stroke="#d03b3b" stroke-width="1.1"/><text x="732" y="268" font-size="11.5" fill="#0b0b0b" font-weight="600">FIX ALL, ONCE</text><text x="732" y="283" font-size="9.3" fill="#52514e">batch every captured fix, then ONE</text><text x="732" y="295.555" font-size="9.3" fill="#52514e">dry-run — never</text><text x="732" y="308.11" font-size="9.3" fill="#52514e">one-defect-per-round</text><path d="M932,284 L948,284" fill="none" stroke="#d03b3b" stroke-width="1.6" marker-end="url(#arrR)"/><rect x="948" y="248" width="210" height="72" rx="7" fill="#ffffff" stroke="#d03b3b" stroke-width="1.1"/><text x="958" y="268" font-size="11.5" fill="#0b0b0b" font-weight="600">ESCALATE</text><text x="958" y="283" font-size="9.3" fill="#52514e">2 failed fixes on the same error →</text><text x="958" y="295.555" font-size="9.3" fill="#52514e">stop, write top-3 hypotheses, ask</text><text x="958" y="308.11" font-size="9.3" fill="#52514e">the human</text><path d="M343,148 L343,210" fill="none" stroke="#d03b3b" stroke-width="1.6" marker-end="url(#arrR)"/><rect x="346" y="175" width="80.8" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="350" y="185" font-size="10.3" fill="#52514e" text-anchor="start" font-weight="500">dry-run FAILS</text><text x="28" y="392" font-size="10.8" fill="#52514e">Deploy-mode gotcha learned in Sprint 1: formulas reading $CustomMetadata cannot validate under checkOnly with same-transaction CMDT records —</text><text x="28" y="406.58" font-size="10.8" fill="#52514e">that is a deploy-STRATEGY issue (two-phase deploy), not a code bug. metadata-lint.js now flags it before it ever reaches an org.</text></g>
</svg>
<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">02 · The Phase State Machine — One Step at a Time, Four Human Gates</text><text x="28" y="54" font-size="11.5" fill="#52514e">The YAML block in PIPELINE_STATE.md is the single machine-readable truth. No agent may advance more than one step, or past a gate.</text><rect x="30" y="96" width="170" height="56" rx="9" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.3"/><text x="115" y="120" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">NOT_STARTED</text><text x="115" y="138" font-size="10.2" fill="#52514e" text-anchor="middle">/kickoff</text><path d="M200,124 L268,124" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="268" y="96" width="170" height="56" rx="9" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.3"/><text x="353" y="120" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">DISCOVERY</text><text x="353" y="138" font-size="10.2" fill="#52514e" text-anchor="middle">/ba-analyze</text><path d="M438,124 L506,124" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="506" y="96" width="170" height="56" rx="9" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.3"/><text x="591" y="120" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">ARCH_DESIGN</text><text x="591" y="138" font-size="10.2" fill="#52514e" text-anchor="middle">/arch-design</text><path d="M676,124 L744,124" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="744" y="96" width="170" height="56" rx="9" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.3"/><text x="829" y="120" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">SPRINT_PLANNED</text><text x="829" y="138" font-size="10.2" fill="#52514e" text-anchor="middle">/pm-plan</text><path d="M948,104 L968,124 L948,144 L928,124 z" fill="#d03b3b"/><text x="948" y="127.5" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">GATE</text><text x="948" y="158" font-size="9.5" fill="#d03b3b" text-anchor="middle" font-weight="600">build start</text><path d="M914,124 L925,124" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M971,124 L982,124" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="982" y="96" width="170" height="56" rx="9" fill="#2a78d622" stroke="#2a78d6" stroke-width="2.2"/><text x="1067" y="120" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">DEV_IN_PROGRESS</text><text x="1067" y="138" font-size="10.2" fill="#52514e" text-anchor="middle">/dev-implement</text><text x="1067" y="88" font-size="10" fill="#2a78d6" text-anchor="middle" font-weight="600">◀ current (Sprint 1 built)</text><path d="M1067,152 L1067,200 L115,200 L115,242" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="443.20000000000005" y="185" width="293.59999999999997" height="14" rx="3" fill="#fcfcfb" opacity="0.92"/><text x="590" y="195" font-size="10.3" fill="#52514e" text-anchor="middle" font-weight="500">all tickets In Review → human declares DEV_COMPLETE</text><rect x="30" y="242" width="170" height="56" rx="9" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.3"/><text x="115" y="266" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">DEV_COMPLETE</text><text x="115" y="284" font-size="10.2" fill="#52514e" text-anchor="middle">/dev-review</text><path d="M234,250 L254,270 L234,290 L214,270 z" fill="#d03b3b"/><text x="234" y="273.5" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">GATE</text><text x="234" y="304" font-size="9.5" fill="#d03b3b" text-anchor="middle" font-weight="600">review done</text><path d="M200,270 L211,270" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M257,270 L268,270" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="268" y="242" width="170" height="56" rx="9" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.3"/><text x="353" y="266" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">BA_ARCH_CONFIRM</text><text x="353" y="284" font-size="10.2" fill="#52514e" text-anchor="middle">/arch-confirm</text><path d="M472,250 L492,270 L472,290 L452,270 z" fill="#d03b3b"/><text x="472" y="273.5" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">GATE</text><text x="472" y="304" font-size="9.5" fill="#d03b3b" text-anchor="middle" font-weight="600">drift-check go</text><path d="M438,270 L449,270" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M495,270 L506,270" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="506" y="242" width="170" height="56" rx="9" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.3"/><text x="591" y="266" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">READY_FOR_QA</text><text x="591" y="284" font-size="10.2" fill="#52514e" text-anchor="middle">/qa-plan</text><path d="M676,270 L744,270" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="744" y="242" width="170" height="56" rx="9" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.3"/><text x="829" y="266" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">QA_IN_PROGRESS</text><text x="829" y="284" font-size="10.2" fill="#52514e" text-anchor="middle">/qa-run · /qa-report</text><path d="M948,250 L968,270 L948,290 L928,270 z" fill="#d03b3b"/><text x="948" y="273.5" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">GATE</text><text x="948" y="304" font-size="9.5" fill="#d03b3b" text-anchor="middle" font-weight="600">release</text><path d="M914,270 L925,270" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M971,270 L982,270" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="982" y="242" width="170" height="56" rx="9" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.3"/><text x="1067" y="266" font-size="12" fill="#0b0b0b" text-anchor="middle" font-weight="600">DONE</text><text x="1067" y="284" font-size="10.2" fill="#52514e" text-anchor="middle">/retro</text><text x="30" y="356" font-size="11" fill="#52514e">Gate rule: an agent may PROPOSE a gate transition (/advance) — only the human may APPROVE it. Every transition appends one audit line to the state log.</text><rect x="30" y="373" width="11" height="11" rx="3" fill="#d03b3b"/><text x="46" y="382" font-size="10.5" fill="#52514e">human gate (4)</text><rect x="146.39999999999998" y="373" width="11" height="11" rx="3" fill="#2a78d6"/><text x="162.39999999999998" y="382" font-size="10.5" fill="#52514e">current phase</text><rect x="257.2" y="373" width="11" height="11" rx="3" fill="#ffffff"/><text x="273.2" y="382" font-size="10.5" fill="#52514e">agent-driven transition</text></g>

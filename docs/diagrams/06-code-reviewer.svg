<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">06 · Inside the Code Reviewer — Independence by Construction</text><text x="28" y="54" font-size="11.5" fill="#52514e">Tools: Read, Grep, Glob, Bash only. It can run tests and linters but can never fix the code it judges.</text><path d="M28,96 q0,-6 6,-6 h198 l14,14 v30 q0,6 -6,6 h-206 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M232,90 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="38" y="111" font-size="12" fill="#0b0b0b" font-weight="600">Ticket + ACs</text><text x="38" y="126" font-size="10" fill="#52514e">sprint-plan / jira-log spec</text><path d="M28,156 q0,-6 6,-6 h198 l14,14 v30 q0,6 -6,6 h-206 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M232,150 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="38" y="171" font-size="12" fill="#0b0b0b" font-weight="600">Review packet</text><text x="38" y="186" font-size="10" fill="#52514e">dev agent’s own claims</text><path d="M28,216 q0,-6 6,-6 h198 l14,14 v30 q0,6 -6,6 h-206 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M232,210 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="38" y="231" font-size="12" fill="#0b0b0b" font-weight="600">technical-design.md</text><text x="38" y="246" font-size="10" fill="#52514e">the contract to check against</text><path d="M28,276 q0,-6 6,-6 h198 l14,14 v30 q0,6 -6,6 h-206 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M232,270 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="38" y="291" font-size="12" fill="#0b0b0b" font-weight="600">force-app/ diff</text><text x="38" y="306" font-size="10" fill="#52514e">including files the packet</text><text x="38" y="318.6" font-size="10" fill="#52514e">conveniently didn’t list</text><rect x="320" y="96" width="300" height="232" rx="8" fill="#eb68341A" stroke="#eb6834" stroke-width="1.6"/><text x="332" y="117" font-size="14" fill="#0b0b0b" font-weight="600">code-reviewer</text><rect x="572.4" y="103" width="39.6" height="16" rx="8" fill="#eb6834"/><text x="592.2" y="114.5" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="600">opus</text><rect x="336" y="128" width="268" height="26" rx="5" fill="#ffffff" stroke="#eb6834" stroke-width="1"/><text x="346" y="140" font-size="10" fill="#0b0b0b" font-weight="600">1  CORRECTNESS</text><text x="346" y="150" font-size="8.8" fill="#52514e">walk every Given/When/Then against the code</text><rect x="336" y="160" width="268" height="26" rx="5" fill="#ffffff" stroke="#eb6834" stroke-width="1"/><text x="346" y="172" font-size="10" fill="#0b0b0b" font-weight="600">2  §3.4 INTEGRITY</text><text x="346" y="182" font-size="8.8" fill="#52514e">"how would I overbook this?" — hunt unlocked paths</text><rect x="336" y="192" width="268" height="26" rx="5" fill="#ffffff" stroke="#eb6834" stroke-width="1"/><text x="346" y="204" font-size="10" fill="#0b0b0b" font-weight="600">3  SECURITY</text><text x="346" y="214" font-size="8.8" fill="#52514e">sharing · CRUD/FLS · injection · hardcoded IDs</text><rect x="336" y="224" width="268" height="26" rx="5" fill="#ffffff" stroke="#eb6834" stroke-width="1"/><text x="346" y="236" font-size="10" fill="#0b0b0b" font-weight="600">4  COMPLIANCE</text><text x="346" y="246" font-size="8.8" fill="#52514e">no-Aadhaar · C1 fields only · facility scoping</text><rect x="336" y="256" width="268" height="26" rx="5" fill="#ffffff" stroke="#eb6834" stroke-width="1"/><text x="346" y="268" font-size="10" fill="#0b0b0b" font-weight="600">5  STANDARDS + LIMITS</text><text x="346" y="278" font-size="8.8" fill="#52514e">rules/20 · metadata-lint.js · description caps</text><rect x="336" y="288" width="268" height="26" rx="5" fill="#ffffff" stroke="#eb6834" stroke-width="1"/><text x="346" y="300" font-size="10" fill="#0b0b0b" font-weight="600">6  TESTS</text><text x="346" y="310" font-size="8.8" fill="#52514e">real asserts, negative paths — not just coverage %</text><path d="M246,115 L320,115" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M246,175 L320,175" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M246,235 L320,235" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M246,295 L320,295" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M700,102 q0,-6 6,-6 h230 l14,14 v72 q0,6 -6,6 h-238 q-6,0 -6,-6 z" fill="#ffffff" stroke="#c3c2b7" stroke-width="1.2"/>
<path d="M936,96 l14,14 h-14 z" fill="#f0efec" stroke="#c3c2b7" stroke-width="1"/><text x="710" y="117" font-size="12" fill="#0b0b0b" font-weight="600">VS-##-code-review.md</text><text x="710" y="132" font-size="10" fill="#52514e">verdict per category</text><text x="710" y="144.6" font-size="10" fill="#52514e">findings ranked BLOCKER / MAJOR /</text><text x="710" y="157.2" font-size="10" fill="#52514e">MINOR / NIT — each with file:line</text><text x="710" y="169.8" font-size="10" fill="#52514e">and a failure scenario</text><rect x="700" y="210" width="250" height="54" rx="8" fill="#0ca30c1A" stroke="#0ca30c" stroke-width="1.6"/><text x="712" y="231" font-size="14" fill="#0b0b0b" font-weight="600">APPROVE</text><text x="712" y="247" font-size="10.3" fill="#52514e">zero findings is legitimate —</text><text x="712" y="259.8" font-size="10.3" fill="#52514e">no manufactured nits</text><rect x="700" y="280" width="250" height="54" rx="8" fill="#d03b3b1A" stroke="#d03b3b" stroke-width="1.6"/><text x="712" y="301" font-size="14" fill="#0b0b0b" font-weight="600">REQUEST-CHANGES</text><text x="712" y="317" font-size="10.3" fill="#52514e">BLOCKER on §3.4 also echoed to</text><text x="712" y="329.8" font-size="10.3" fill="#52514e">handoffs.md for drift-check &amp; QA</text><path d="M620,140 L700,140" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M620,220 L700,235" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><path d="M620,280 L700,305" fill="none" stroke="#898781" stroke-width="1.6" marker-end="url(#arr)"/><rect x="320" y="344" width="300" height="30" rx="6" fill="#f0efec"/><text x="470" y="363" font-size="11" fill="#52514e" text-anchor="middle" font-weight="600">🔒 no Write · no Edit — reviews, never rewrites</text><text x="28" y="402" font-size="10.8" fill="#52514e">Real catches from Sprint 1: a missing design field (VS_No_Show_Count__c) that would have broken a later ticket, and the honest finding that six</text><text x="28" y="416.58" font-size="10.8" fill="#52514e">static reviews could not prove deployability — which produced the metadata-lint + dry-run-early rules now in force.</text></g>

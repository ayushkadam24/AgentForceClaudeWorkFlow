<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430">
<defs>
<marker id="arr" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#898781"/></marker>
<marker id="arrD" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#52514e"/></marker>
<marker id="arrR" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#d03b3b"/></marker>
<marker id="arrG" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#0ca30c"/></marker>
</defs>
<rect width="1200" height="430" fill="#fcfcfb"/>
<g font-family="Segoe UI, DejaVu Sans, Arial, sans-serif"><text x="28" y="34" font-size="20" fill="#0b0b0b" font-weight="600">11 · Model Routing — Pay Opus Only Where Errors Cascade</text><text x="28" y="54" font-size="11.5" fill="#52514e">Each agent pins its model in frontmatter. Sonnet where a rubric constrains the work; Opus where a mistake multiplies downstream.</text><rect x="28" y="80" width="560" height="300" rx="10" fill="#ffffff" stroke="#e1e0d9"/><text x="44" y="104" font-size="13" fill="#0b0b0b" font-weight="600">OPUS — judgment seats</text><rect x="44" y="118" width="160" height="40" rx="8" fill="#2a78d61A" stroke="#2a78d6" stroke-width="1.6"/><text x="56" y="139" font-size="14" fill="#0b0b0b" font-weight="600">ba-analyst</text><text x="216" y="135" font-size="9.8" fill="#52514e">the whole POC is graded on its analysis; an uncaught</text><text x="216" y="148.23" font-size="9.8" fill="#52514e">gap poisons everything downstream</text><rect x="44" y="168" width="160" height="40" rx="8" fill="#1baf7a1A" stroke="#1baf7a" stroke-width="1.6"/><text x="56" y="189" font-size="14" fill="#0b0b0b" font-weight="600">architect</text><text x="216" y="185" font-size="9.8" fill="#52514e">architecture errors are the most expensive to</text><text x="216" y="198.23" font-size="9.8" fill="#52514e">discover late</text><rect x="44" y="218" width="160" height="40" rx="8" fill="#0083001A" stroke="#008300" stroke-width="1.6"/><text x="56" y="239" font-size="14" fill="#0b0b0b" font-weight="600">dev-senior</text><text x="216" y="235" font-size="9.8" fill="#52514e">race conditions are subtle; the §3.4 concurrency</text><text x="216" y="248.23" font-size="9.8" fill="#52514e">test is pass/fail at acceptance</text><rect x="44" y="268" width="160" height="40" rx="8" fill="#eb68341A" stroke="#eb6834" stroke-width="1.6"/><text x="56" y="289" font-size="14" fill="#0b0b0b" font-weight="600">code-reviewer</text><text x="216" y="285" font-size="9.8" fill="#52514e">the last line of defense before human sign-off</text><rect x="44" y="318" width="160" height="40" rx="8" fill="#52514e1A" stroke="#52514e" stroke-width="1.6"/><text x="56" y="339" font-size="14" fill="#0b0b0b" font-weight="600">devops</text><text x="216" y="335" font-size="9.8" fill="#52514e">upgraded mid-project: deploy triage is root-cause</text><text x="216" y="348.23" font-size="9.8" fill="#52514e">analysis (protocol + model)</text><rect x="612" y="80" width="560" height="300" rx="10" fill="#ffffff" stroke="#e1e0d9"/><text x="628" y="104" font-size="13" fill="#0b0b0b" font-weight="600">SONNET — rubric-constrained seats</text><rect x="628" y="118" width="160" height="40" rx="8" fill="#4a3aa71A" stroke="#4a3aa7" stroke-width="1.6"/><text x="640" y="139" font-size="14" fill="#0b0b0b" font-weight="600">pm-planner</text><text x="800" y="135" font-size="9.8" fill="#52514e">structured decomposition against an explicit ticket</text><text x="800" y="148.23" font-size="9.8" fill="#52514e">format and routing rubric</text><rect x="628" y="168" width="160" height="40" rx="8" fill="#eda1001A" stroke="#eda100" stroke-width="1.6"/><text x="640" y="189" font-size="14" fill="#0b0b0b" font-weight="600">dev-mid</text><text x="800" y="185" font-size="9.8" fill="#52514e">highest metadata token volume; format discipline</text><text x="800" y="198.23" font-size="9.8" fill="#52514e">matters more than deep reasoning</text><rect x="628" y="218" width="160" height="40" rx="8" fill="#e87ba41A" stroke="#e87ba4" stroke-width="1.6"/><text x="640" y="239" font-size="14" fill="#0b0b0b" font-weight="600">qa-lead</text><text x="800" y="235" font-size="9.8" fill="#52514e">the plan derives mechanically from design + risk</text><text x="800" y="248.23" font-size="9.8" fill="#52514e">tiers already written in rules</text><rect x="628" y="268" width="160" height="40" rx="8" fill="#e349481A" stroke="#e34948" stroke-width="1.6"/><text x="640" y="289" font-size="14" fill="#0b0b0b" font-weight="600">qa-engineer</text><text x="800" y="285" font-size="9.8" fill="#52514e">heaviest token consumer (browser loops, spec files);</text><text x="800" y="298.23" font-size="9.8" fill="#52514e">guided execution</text><text x="628" y="340" font-size="10.5" fill="#52514e" font-style="italic">Haiku: reserved for future mechanical helpers —</text><text x="628" y="354.175" font-size="10.5" fill="#52514e" font-style="italic">none of the nine roles is safely mechanical.</text><text x="28" y="406" font-size="10.8" fill="#52514e">Structural savings matter as much as tiers: subagents run in isolated contexts (they load files, not your conversation), and skills/rules load</text><text x="28" y="420.58" font-size="10.8" fill="#52514e">from disk per run. Sprint-1 lesson: the devops failure looked like a model problem but was mostly a missing protocol — fix was BOTH.</text></g>
</svg>